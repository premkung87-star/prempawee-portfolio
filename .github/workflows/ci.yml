name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  ragas-eval:
    name: RAG answer quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run on PRs and pushes to main. Skip in fork PRs that lack the
    # ANTHROPIC_API_KEY secret (judge phase would no-op anyway).
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run RAG evals against production
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_TARGET: https://prempawee-portfolio.vercel.app
          EVAL_MIN_SCORE: "0.7"
          # Skip judge in CI if secret not provided (behavioral-only gate)
          EVAL_SKIP_JUDGE: ${{ secrets.ANTHROPIC_API_KEY && '' || '1' }}
        run: node scripts/eval-rag.mjs

  e2e:
    name: browser smoke (§17/§20 regression gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    # Run the real-browser E2E against production after every push to main.
    # AUDIT_LOG §20 taught us that curl + response headers + Supabase row counts
    # do NOT prove hydration. Only a real browser clicking a button does.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel prod deploy to settle
        run: sleep 60

      - name: Run E2E smoke suite against production
        env:
          BASE_URL: https://prempawee.com
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
